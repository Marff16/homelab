<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #f5f0e8;
      --bg2:    #ede8de;
      --border: #d6cec3;
      --text:   #28201a;
      --muted:  #7a6d62;
      --accent: #b85c38;
      --radius: 10px;
      --font:   'Inter', system-ui, sans-serif;
      --head:   'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 4rem 3rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      font-family: var(--head);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 .dot { color: var(--accent); }

    p {
      margin-top: 1rem;
      color: var(--muted);
      font-weight: 300;
      font-size: 1rem;
    }

    .clock {
      margin-top: 2rem;
      font-family: var(--head);
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
    }

    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Homelab<span class="dot">.</span></h1>
    <p>Personal local infrastructure — self-hosted, private, yours.</p>
    <div class="clock" id="clock"></div>
  </main>

  <footer>Self-hosted · Tailscale · local-first</footer>

  <script>
    const clock = document.getElementById('clock');
    const tick = () => {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    };
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
