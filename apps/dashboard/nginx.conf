server {
    listen 80;
    root /usr/share/nginx/html;

    location = / {
        return 301 /homelab/landing;
    }

    location = /homelab/landing {
        default_type text/html;
        try_files /homelab/pages/landing.html =404;
    }

    location = /homelab/dashboard {
        default_type text/html;
        try_files /homelab/pages/dashboard.html =404;
    }

    location = /homelab/status {
        default_type text/html;
        try_files /homelab/pages/status.html =404;
    }
}
