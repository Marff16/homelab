<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab · Dashboard</title>
  <!-- apply the saved animation preference before first paint to avoid a flash -->
  <script>
    if (localStorage.getItem('homelab-anim') === 'off')
      document.documentElement.classList.add('no-anim');
  </script>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #f5f0e8;
      --bg2:    #ede8de;
      --border: #d6cec3;
      --text:   #28201a;
      --muted:  #7a6d62;
      --accent: #b85c38;
      --radius: 10px;
      --font:   'Inter', system-ui, sans-serif;
      --head:   'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; background: var(--bg); }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      /* fade in on arrival; 'backwards' keeps opacity free for the fade-out */
      animation: fade-in 0.25s ease backwards;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* fade the whole page out before stepping back outside */
    body.fade-out {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    /* global kill-switch toggled by the Animations switch / reduced-motion */
    .no-anim, .no-anim *, .no-anim *::before, .no-anim *::after {
      animation: none !important;
      transition: none !important;
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      body.fade-out { transition: none; }
    }

    a { color: inherit; text-decoration: none; }

    /* ---- Top navigation ---- */
    .topnav {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    /* centred date + weekday + time (no seconds) */
    .topclock {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--head);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
    }
    .topclock .tc-short { display: none; }

    .logo {
      font-family: var(--head);
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo .dot { color: var(--accent); }

    /* ---- Menu button + sidebar ---- */
    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .menu-btn:hover { background: var(--bg2); color: var(--text); }
    .menu-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .menu-btn svg { width: 1.15rem; height: 1.15rem; }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(40, 32, 26, 0.35);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 40;
    }
    .backdrop.open { opacity: 1; visibility: visible; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 280px;
      max-width: 82vw;
      background: var(--bg);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(.4, 0, .2, 1);
      z-index: 50;
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .sidebar-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .sidebar-close:hover { background: var(--bg2); color: var(--text); }
    .sidebar-close svg { width: 1.2rem; height: 1.2rem; }
    .menu-label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.25rem 0 0.5rem 0.8rem;
    }
    .sidebar nav { display: flex; flex-direction: column; gap: 0.2rem; }
    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      border-radius: var(--radius);
      color: var(--muted);
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .sidebar nav a:hover { background: var(--bg2); color: var(--text); }
    .sidebar nav a.active { background: var(--bg2); color: var(--accent); }
    .sidebar nav a svg { width: 1.2rem; height: 1.2rem; flex-shrink: 0; }

    /* ---- Animations toggle ---- */
    .anim-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .anim-toggle input { position: absolute; opacity: 0; pointer-events: none; }
    .anim-toggle .track {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.2s ease;
    }
    .anim-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease;
    }
    .anim-toggle input:checked + .track { background: var(--accent); }
    .anim-toggle input:checked + .track .thumb { transform: translateX(16px); }
    .anim-toggle input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---- Main / overview ---- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 3rem 2rem 4rem;
    }

    .overview-shell {
      width: min(100%, 860px);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .greeting {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 132px;
    }

    .greeting-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      gap: 0.35rem;
      min-width: 0;
    }

    .greeting-moji {
      width: clamp(74px, 12vw, 118px);
      aspect-ratio: 1;
      object-fit: contain;
      flex-shrink: 0;
    }

    .greeting .phrase {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .overview-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .overview-work {
      display: flex;
      min-height: 260px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 0;
    }

    .wip-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg2);
      font-family: var(--head);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .wip-badge .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    main h1 {
      font-family: var(--head);
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.05;
    }
    main h2 {
      font-family: var(--head);
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }
    main p {
      color: var(--muted);
      font-weight: 300;
      max-width: 40ch;
    }

    /* ---- Bottom navigation ---- */
    .bottomnav {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    /* keep nav links centred while the toggle sits at the right edge */
    .bottomnav .anim-toggle {
      position: absolute;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
    }
    .bottomnav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .bottomnav a:hover { color: var(--text); background: var(--bg2); }
    .bottomnav a.active { color: var(--accent); }
    .bottomnav svg { width: 1.3rem; height: 1.3rem; }

    @media (prefers-reduced-motion: reduce) {
      .wip-badge .pulse { animation: none; }
    }

    @media (max-width: 560px) {
      .topnav { padding: 1rem 1.2rem; }
      .topclock { font-size: 0.7rem; }
      .topclock .tc-full { display: none; }
      .topclock .tc-short { display: inline; }

      main { padding: 2rem 1.2rem 3rem; }
      .overview-shell { gap: 1.5rem; }
      .greeting {
        min-height: 110px;
        justify-content: flex-start;
        gap: 0.8rem;
      }
      .greeting-moji { width: 72px; }
      .greeting .phrase { font-size: 0.85rem; }

      /* stack the bottom bar: toggle row on top, icons spread evenly below */
      .bottomnav {
        flex-wrap: wrap;
        gap: 0;
        padding: 0;
      }
      .bottomnav a {
        flex: 1;
        padding: 0.55rem 0.25rem;
        font-size: 0.66rem;
        gap: 0.3rem;
      }
      .bottomnav svg { width: 1.2rem; height: 1.2rem; }
      .bottomnav .anim-toggle {
        position: static;
        transform: none;
        order: -1;                 /* place above the icon row */
        width: 100%;
        justify-content: center;
        padding: 0.6rem;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>

  <script>
    // ---- Top clock: date, weekday, time (no seconds) ----
    const tcFull = document.getElementById('tc-full');
    const tcShort = document.getElementById('tc-short');
    const tickTop = () => {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      tcFull.textContent =
        now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' }) + ' · ' + time;
      tcShort.textContent =
        now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) + ' · ' + time;
    };
    tickTop();
    setInterval(tickTop, 1000);

    // ---- Sidebar menu ----
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    const menuBtn = document.getElementById('menu-btn');
    const openMenu = () => {
      sidebar.classList.add('open'); backdrop.classList.add('open');
      menuBtn.setAttribute('aria-expanded', 'true'); sidebar.setAttribute('aria-hidden', 'false');
    };
    const closeMenu = () => {
      sidebar.classList.remove('open'); backdrop.classList.remove('open');
      menuBtn.setAttribute('aria-expanded', 'false'); sidebar.setAttribute('aria-hidden', 'true');
    };
    menuBtn.addEventListener('click', openMenu);
    backdrop.addEventListener('click', closeMenu);
    document.getElementById('sidebar-close').addEventListener('click', closeMenu);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });

    // ---- Animations toggle ----
    const ANIM_KEY = 'homelab-anim';
    const toggle = document.getElementById('anim');
    const animOn = () => localStorage.getItem(ANIM_KEY) !== 'off';
    toggle.checked = animOn();
    toggle.addEventListener('change', () => {
      localStorage.setItem(ANIM_KEY, toggle.checked ? 'on' : 'off');
      document.documentElement.classList.toggle('no-anim', !toggle.checked);
    });

    // ---- Fade-out transition on "Step Outside" ----
    const leave = document.querySelector('.leave');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const skipAnim = () => reduce || !animOn();

    // reset state if the page is restored from the back/forward cache
    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out');
    });

    leave.addEventListener('click', (e) => {
      if (skipAnim()) return; // navigate instantly when animations are off
      e.preventDefault();
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = leave.getAttribute('href'); }, 250);
    });

    // ---- Time-aware greeting ----
    const phrase = document.getElementById('greeting-phrase');
    const title = document.getElementById('greeting-title');
    const moji = document.getElementById('greeting-moji');
    const mojiBase = '/homelab/images/mojis/';
    const mojiBySlot = {
      morning: 'morning.png',
      afternoon: 'noon.png',
      evening: 'late.png',
      night: 'night.png'
    };
    const greetingSets = {
      morning: [
        'Coffee first, packets second',
        'The lab made it through the night',
        'Fresh boot energy'
      ],
      afternoon: [
        'Midday telemetry, no drama',
        'Still serving, still smug',
        'The packets are behaving'
      ],
      evening: [
        'Evening watch is online',
        'The network is in slippers',
        'Quiet ops, warm lights'
      ],
      night: [
        'Night shift, tiny blinking lights',
        'The lab whispers uptime',
        'Sleep mode for humans, not servers'
      ]
    };
    const titleSets = {
      morning: [
        '{name}, the lab is awake.',
        'Rise and route, {name}.',
        'Morning, {name}. The bits are brewing.'
      ],
      afternoon: [
        '{name}, command center is open.',
        'Afternoon, {name}. All systems are pretending to be calm.',
        '{name}, the dashboard kept your seat warm.'
      ],
      evening: [
        'Welcome back, {name}.',
        '{name}, the evening console awaits.',
        'Good evening, {name}. The homelab is glowing.'
      ],
      night: [
        '{name}, the night watch is yours.',
        'Late one, {name}?',
        '{name}, the servers are still awake.'
      ]
    };

    const timeSlot = () => {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return 'morning';
      if (hour >= 12 && hour < 17) return 'afternoon';
      if (hour >= 17 && hour < 22) return 'evening';
      return 'night';
    };

    const chooseGreeting = (slot) => {
      const options = greetingSets[slot];
      const day = Math.floor(Date.now() / 86400000);
      const hour = new Date().getHours();
      return options[(day + hour) % options.length];
    };

    const chooseTitle = (slot, name) => {
      const cleanName = name || 'friend';
      const options = titleSets[slot];
      const day = Math.floor(Date.now() / 86400000);
      const hour = new Date().getHours();
      return options[(day + hour + 1) % options.length].replace('{name}', cleanName);
    };

    const setGreeting = (name = '') => {
      const slot = timeSlot();
      const cleanName = String(name).trim();
      const greeting = chooseGreeting(slot);
      moji.src = mojiBase + (mojiBySlot[slot] || 'fallback.png');
      title.textContent = chooseTitle(slot, cleanName);
      phrase.textContent = greeting;
    };

    moji.addEventListener('error', () => {
      if (moji.src.endsWith('/fallback.png')) return;
      moji.src = mojiBase + 'fallback.png';
    });

    async function loadConfig() {
      try {
        const response = await fetch('/homelab/api/config.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(response.status);
        const config = await response.json();
        setGreeting(config.your_name);
      } catch (e) {
        setGreeting();
      }
    }

    loadConfig();
    setInterval(loadConfig, 60000);
  </script>
</body>
</html>
