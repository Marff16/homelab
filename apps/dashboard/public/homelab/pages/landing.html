<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab</title>
  <!-- apply the saved animation preference before first paint to avoid a flash -->
  <script>
    if (localStorage.getItem('homelab-anim') === 'off')
      document.documentElement.classList.add('no-anim');
  </script>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #f5f0e8;
      --bg2:    #ede8de;
      --border: #d6cec3;
      --text:   #28201a;
      --muted:  #7a6d62;
      --accent: #b85c38;
      --radius: 10px;
      --font:   'Inter', system-ui, sans-serif;
      --head:   'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; background: var(--bg); }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      /* fade in on arrival; 'backwards' keeps opacity free for the fade-out */
      animation: fade-in 0.25s ease backwards;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* fade the whole page out before navigating */
    body.fade-out {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    /* global kill-switch toggled by the Animations switch / reduced-motion */
    .no-anim, .no-anim *, .no-anim *::before, .no-anim *::after {
      animation: none !important;
      transition: none !important;
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 3rem;
      padding: 4rem 3rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .intro { display: flex; flex-direction: column; align-items: flex-start; }

    h1 {
      font-family: var(--head);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 .dot { color: var(--accent); }

    p {
      margin-top: 1rem;
      color: var(--muted);
      font-weight: 300;
      font-size: 1rem;
    }

    .clock {
      margin-top: 2rem;
      font-family: var(--head);
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* ---- Enter button ---- */
    .enter {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.4rem;
      font-family: var(--head);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      text-decoration: none;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease, border-color 0.35s ease, transform 0.2s ease;
    }
    /* accent fill that sweeps in from the left on hover */
    .enter::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(.45,.05,.3,1);
      z-index: 0;
    }
    .enter > * { position: relative; z-index: 1; }
    .enter:hover { color: #fff; border-color: var(--accent); }
    .enter:hover::before { transform: translateX(0); }
    .enter:active { transform: translateY(1px); }

    .enter .door {
      width: 1.1rem;
      height: 1.1rem;
      transition: transform 0.35s cubic-bezier(.45,.05,.3,1);
    }
    .enter:hover .door { transform: translateX(3px) rotate(2deg); }

    @media (prefers-reduced-motion: reduce) {
      .enter, .enter::before, .enter .door { transition: none; }
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ---- Animations toggle ---- */
    .anim-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .anim-toggle input { position: absolute; opacity: 0; pointer-events: none; }
    .anim-toggle .track {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.2s ease;
    }
    .anim-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease;
    }
    .anim-toggle input:checked + .track { background: var(--accent); }
    .anim-toggle input:checked + .track .thumb { transform: translateX(16px); }
    .anim-toggle input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---- House ---- */
    .house {
      position: relative;
      width: clamp(180px, 26vw, 280px);
      flex-shrink: 0;
    }

    .house img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* gentle bob of the whole sketch */
    .house {
      animation: bob 7s ease-in-out infinite;
      transform-origin: center bottom;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    /* smoke puffs drifting up from the chimney (top-right of the roof) */
    .smoke-layer {
      position: absolute;
      /* bottom edge anchored at the chimney opening (~x78%, y12%) */
      top: 0;
      left: 75%;
      width: 10%;
      height: 12%;
      pointer-events: none;
    }
    .smoke-layer .puff {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 55%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0;
      transform: translateX(-50%);
      animation: rise 6s ease-out infinite;
      filter: blur(0.5px);
    }
    .smoke-layer .puff.p2 { animation-delay: 2s; }
    .smoke-layer .puff.p3 { animation-delay: 4s; }

    @keyframes rise {
      0%   { opacity: 0;    transform: translate(-50%, 0)      scale(0.4); }
      20%  { opacity: 0.3;  }
      55%  { opacity: 0.22; transform: translate(-90%, -150%)  scale(1); }
      100% { opacity: 0;    transform: translate(-40%, -320%)  scale(1.9); }
    }

    @media (prefers-reduced-motion: reduce) {
      .house { animation: none; }
      .smoke-layer .puff { animation: none; opacity: 0.2; }
    }

    @media (max-width: 640px) {
      main { flex-direction: column; align-items: flex-start; }
      .house { width: 170px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="intro">
      <h1>Homelab<span class="dot">.</span></h1>
      <p>Personal local infrastructure — self-hosted, private, yours.</p>
      <div class="clock" id="clock"></div>
      <a class="enter" href="/homelab/dashboard">
        <span>Step Inside</span>
        <svg class="door" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13 4h3a2 2 0 0 1 2 2v14" />
          <path d="M2 20h3" />
          <path d="M13 20h9" />
          <path d="M10 12v.01" />
          <path d="M13 4.6v15.8a1 1 0 0 1-1.2 1L5 20V5.6a2 2 0 0 1 1.5-1.9l4-1A2 2 0 0 1 13 4.6Z" />
        </svg>
      </a>
    </div>

    <div class="house">
      <div class="smoke-layer">
        <span class="puff p1"></span>
        <span class="puff p2"></span>
        <span class="puff p3"></span>
      </div>
      <img src="/homelab/images/house-art.png" alt="A hand-drawn house" />
    </div>
  </main>

  <footer>
    <span>Your data · your rules · your home</span>
    <label class="anim-toggle">
      <input type="checkbox" id="anim" />
      <span class="track"><span class="thumb"></span></span>
      Animations
    </label>
  </footer>

  <script>
    const clock = document.getElementById('clock');
    const tick = () => {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    };
    tick();
    setInterval(tick, 1000);

    // ---- Animations toggle ----
    const ANIM_KEY = 'homelab-anim';
    const toggle = document.getElementById('anim');
    const animOn = () => localStorage.getItem(ANIM_KEY) !== 'off';
    toggle.checked = animOn();
    toggle.addEventListener('change', () => {
      localStorage.setItem(ANIM_KEY, toggle.checked ? 'on' : 'off');
      document.documentElement.classList.toggle('no-anim', !toggle.checked);
    });

    // ---- Fade-out transition on "Step Inside" ----
    const enter = document.querySelector('.enter');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const skipAnim = () => reduce || !animOn();

    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out');
    });

    enter.addEventListener('click', (e) => {
      if (skipAnim()) return; // navigate instantly when animations are off
      e.preventDefault();
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = enter.getAttribute('href'); }, 250);
    });
  </script>
</body>
</html>
